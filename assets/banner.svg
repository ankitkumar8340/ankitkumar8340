<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="55%" stop-color="#0d0d1c"/>
      <stop offset="100%" stop-color="#150a24"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <pattern id="circuit" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 20 H40 V60 H80 V20 H120 M20 0 V40 H60 V80 H20 V120" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.18"/>
      <circle cx="40" cy="60" r="2.5" fill="#22d3ee" opacity="0.35"/>
      <circle cx="80" cy="20" r="2.5" fill="#a78bfa" opacity="0.3"/>
      <circle cx="20" cy="40" r="2.5" fill="#f472b6" opacity="0.3"/>
    </pattern>
    <radialGradient id="glow" cx="85%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="260" rx="14" fill="url(#bgGrad)"/>
  <rect width="1000" height="260" rx="14" fill="url(#circuit)"/>
  <rect width="1000" height="260" rx="14" fill="url(#glow)"/>
  <rect x="1" y="1" width="998" height="258" rx="13" fill="none" stroke="#2a2a3d" stroke-width="1.5"/>

  <!-- hello world tag -->
  <g transform="translate(40,42)">
    <text x="0" y="0" font-family="Consolas, Menlo, monospace" font-size="15" fill="#c084fc">&gt;&gt;</text>
    <text x="22" y="0" font-family="Consolas, Menlo, monospace" font-size="15" fill="#c084fc">hello world!</text>
    <rect x="152" y="-12" width="9" height="16" fill="#c084fc">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Hi, I'm -->
  <text x="40" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#e5e7eb">Hi, I&#39;m</text>

  <!-- Name -->
  <text x="40" y="148" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="46" fill="url(#nameGrad)">Ankit Kumar</text>

  <!-- Role -->
  <text x="40" y="184" font-family="Consolas, Menlo, monospace" font-size="19" fill="#4ade80">&gt; Full Stack Web Developer</text>

  <!-- contact row -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13.5" fill="#94a3b8">
    <text x="40" y="222">&#128205; Phagwara, Punjab, India</text>
    <text x="255" y="222">&#9993; ankitkumarswe01@gmail.com</text>
    <text x="530" y="222">&#128279; ankitkumar01.vercel.app</text>
  </g>

  <!-- social icons top right -->
  <g transform="translate(915,34)">
    <circle cx="0" cy="0" r="17" fill="#161622" stroke="#33334a"/>
    <text x="0" y="5" text-anchor="middle" font-family="Segoe UI Symbol, sans-serif" font-size="15" fill="#e5e7eb">GH</text>
  </g>
  <g transform="translate(915,84)">
    <circle cx="0" cy="0" r="17" fill="#161622" stroke="#33334a"/>
    <text x="0" y="5" text-anchor="middle" font-family="Segoe UI Symbol, sans-serif" font-size="12" fill="#e5e7eb">in</text>
  </g>
  <g transform="translate(915,134)">
    <circle cx="0" cy="0" r="17" fill="#161622" stroke="#33334a"/>
    <text x="0" y="5" text-anchor="middle" font-family="Segoe UI Symbol, sans-serif" font-size="13" fill="#e5e7eb">@</text>
  </g>
  <g transform="translate(915,184)">
    <circle cx="0" cy="0" r="17" fill="#161622" stroke="#33334a"/>
    <text x="0" y="5" text-anchor="middle" font-family="Segoe UI Symbol, sans-serif" font-size="13" fill="#e5e7eb">&#8599;</text>
  </g>

  <!-- monitor/desk silhouette (right side, abstract) -->
  <g transform="translate(700,60)" opacity="0.9">
    <rect x="0" y="40" width="150" height="90" rx="6" fill="#0f172a" stroke="#334155"/>
    <rect x="8" y="48" width="134" height="74" rx="3" fill="#0b1220"/>
    <path d="M14 56 h60 M14 66 h90 M14 76 h50 M14 86 h100 M14 96 h40 M14 106 h80" stroke="#22d3ee" stroke-width="2" opacity="0.5"/>
    <rect x="160" y="55" width="95" height="65" rx="6" fill="#0f172a" stroke="#334155"/>
    <rect x="167" y="62" width="81" height="51" rx="3" fill="#0b1220"/>
    <path d="M172 70 h50 M172 80 h65 M172 90 h35 M172 100 h55" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
    <rect x="60" y="130" width="30" height="10" fill="#1e293b"/>
    <rect x="30" y="140" width="190" height="6" rx="3" fill="#1e293b"/>
  </g>
</svg>
